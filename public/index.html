<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>mathbarker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════════
       light theme (default)
       ══════════════════════════════════════════ */
    :root {
      --bg: #faf7f0;
      --card-bg: #f5f1e8;
      --ink: #2a2a2a;
      --faint: #999;
      --line: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.08);
      --border-hover: rgba(0,0,0,0.16);
      --dash: rgba(0,0,0,0.12);
      --corner: rgba(0,0,0,0.08);
      --tape-bg: rgba(0,0,0,0.02);
      --tape-border: rgba(0,0,0,0.05);
      --shadow-hover: rgba(0,0,0,0.03);
      --noise-opacity: 0.04;
      --noise-invert: 0%;
      --canvas-bg: 0.97,0.96,0.94;
      --canvas-particle: 0.15,0.13,0.12;
      --canvas-alpha: 0.035;
      --canvas-opacity: 0.35;
      --canvas-mix: multiply;
      --grid-rgba: rgba(0,0,0,0.035);
    }

    /* ══════════════════════════════════════════
       dark theme
       ══════════════════════════════════════════ */
    :root.dark {
      --bg: #0d0d0d;
      --card-bg: #111111;
      --ink: #d8d8d8;
      --faint: #5a5a5a;
      --line: rgba(255,255,255,0.018);
      --border: rgba(255,255,255,0.05);
      --border-hover: rgba(255,255,255,0.14);
      --dash: rgba(255,255,255,0.08);
      --corner: rgba(255,255,255,0.06);
      --tape-bg: rgba(255,255,255,0.03);
      --tape-border: rgba(255,255,255,0.04);
      --shadow-hover: rgba(255,255,255,0.01);
      --noise-opacity: 0.05;
      --noise-invert: 100%;
      --canvas-bg: 0.05,0.05,0.05;
      --canvas-particle: 0.72,0.72,0.75;
      --canvas-alpha: 0.038;
      --canvas-opacity: 0.50;
      --canvas-mix: screen;
      --grid-rgba: rgba(255,255,255,0.022);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Caveat', cursive;
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── noise texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      opacity: var(--noise-opacity);
      filter: invert(var(--noise-invert));
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      transition: opacity 0.4s ease, filter 0.4s ease;
    }

    /* ── ghost marks (light mode only) ── */
    .ghost-marks {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    :root:not(.dark) .ghost-marks { opacity: 0.55; }
    .ghost-marks svg {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    .ghost-marks line,
    .ghost-marks path,
    .ghost-marks polyline,
    .ghost-marks circle,
    .ghost-marks ellipse,
    .ghost-marks rect {
      fill: none;
      stroke: #bab5a8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .ghost-marks text {
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ── de Jong canvas ── */
    #chaosCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      opacity: var(--canvas-opacity);
      mix-blend-mode: var(--canvas-mix);
      transition: opacity 0.4s ease;
    }

    /* ── notebook grid ── */
    .notebook-grid {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(transparent, transparent 31px, var(--grid-rgba) 31px, var(--grid-rgba) 32px);
      background-size: 100% 32px;
    }

    /* ── page ── */
    .wrap {
      position: relative; z-index: 3;
      width: 100%; max-width: 560px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ── header ── */
    .hd {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px 16px;
      border-bottom: 1.5px dashed var(--dash);
      margin-bottom: 40px;
    }
    .logo {
      font-size: 2rem; font-weight: 700;
      letter-spacing: 0.04em;
      transform: rotate(-0.6deg);
      color: var(--ink);
      transition: color 0.4s ease;
    }
    .hd-right {
      display: flex; align-items: center; gap: 14px;
      font-size: 0.85rem; color: var(--faint);
      transform: rotate(0.4deg);
      transition: color 0.4s ease;
    }

    /* ── theme toggle ── */
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 20px;
      width: 38px; height: 22px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.3s;
      background: var(--card-bg);
      transform: rotate(0deg);
    }
    .theme-toggle:hover { border-color: var(--border-hover); }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--ink);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.4s;
    }
    :root.dark .theme-toggle::after {
      transform: translateX(16px);
    }

    /* ── memo card ── */
    .memo {
      position: relative;
      background: var(--card-bg);
      padding: 32px 28px 24px;
      cursor: pointer;
      font-family: 'Caveat', cursive;
      border: 1.5px solid var(--border);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.4s ease;
    }
    .memo:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 40px var(--shadow-hover);
    }

    .memo + .memo { margin-top: 24px; }

    .memo:nth-child(1) { transform: rotate(-0.4deg); }
    .memo:nth-child(2) { transform: rotate(0.3deg); }
    .memo:nth-child(3) { transform: rotate(0.5deg); }
    .memo:nth-child(4) { transform: rotate(-0.2deg); }
    .memo:nth-child(1):hover { transform: rotate(-0.4deg) translateY(-2px); }
    .memo:nth-child(2):hover { transform: rotate(0.3deg) translateY(-2px); }
    .memo:nth-child(3):hover { transform: rotate(0.5deg) translateY(-2px); }
    .memo:nth-child(4):hover { transform: rotate(-0.2deg) translateY(-2px); }

    /* ── corner marks ── */
    .memo::before {
      content: '';
      position: absolute; top: -1px; left: -1px;
      width: 24px; height: 24px;
      border-top: 1.5px solid var(--corner);
      border-left: 1.5px solid var(--corner);
      border-radius: 0 0 4px 0;
      opacity: 0; transition: opacity 0.2s;
    }
    .memo::after {
      content: '';
      position: absolute; bottom: -1px; right: -1px;
      width: 24px; height: 24px;
      border-bottom: 1.5px solid var(--corner);
      border-right: 1.5px solid var(--corner);
      border-radius: 4px 0 0 0;
      opacity: 0; transition: opacity 0.2s;
    }
    .memo:hover::before, .memo:hover::after { opacity: 1; }

    .memo-num {
      font-size: 0.7rem; font-weight: 600; color: var(--faint);
      letter-spacing: 0.06em; margin-bottom: 6px;
      transition: color 0.4s ease;
    }
    .memo-cat {
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: 0.03em; margin-bottom: 4px;
      color: var(--ink);
      transition: color 0.4s ease;
    }
    .memo-desc {
      font-size: 0.85rem; color: var(--faint);
      line-height: 1.7;
      transition: color 0.4s ease;
    }
    .memo-symbol {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.75rem; color: var(--faint);
      margin-bottom: 8px;
      font-style: italic; letter-spacing: 0.02em;
      transition: color 0.4s ease;
    }

    /* ── tape mark ── */
    .tape {
      position: absolute; top: -12px; left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 36px; height: 14px;
      background: var(--tape-bg);
      border: 1px solid var(--tape-border);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .memo:hover .tape { opacity: 1; }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════
   de Jong attractor — theme-reactive
   ═══════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('chaosCanvas');
  const gl = canvas.getContext('webgl', {alpha: false}) ||
             canvas.getContext('experimental-webgl', {alpha: false});
  if (!gl) return;

  const vertSrc = `
    attribute vec2 a_pos;
    uniform float u_time;
    uniform vec2 u_res;
    void main() {
      float a = -2.0 + sin(u_time / 8000.0);
      float b = -2.0 + cos(u_time / 12000.0) * 0.3;
      float c = -1.2 + sin(u_time / 10000.0) * 0.2;
      float d =  2.0 + cos(u_time / 9000.0)  * 0.3;
      vec2 p = a_pos;
      for (int i = 0; i < 100; i++) {
        float x = sin(a * p.y) - cos(b * p.x);
        float y = sin(c * p.x) - cos(d * p.y);
        p = vec2(x, y);
      }
      vec2 screen = (p * 0.52 + 0.5) * u_res;
      gl_Position = vec4((screen / u_res) * 2.0 - 1.0, 0.0, 1.0);
      gl_PointSize = 1.3;
    }`;

  const fragSrc = `
    precision mediump float;
    uniform vec3 u_color;
    uniform float u_alpha;
    void main() {
      gl_FragColor = vec4(u_color, u_alpha);
    }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);

  const aPos    = gl.getAttribLocation(prog, 'a_pos');
  const uTime   = gl.getUniformLocation(prog, 'u_time');
  const uRes    = gl.getUniformLocation(prog, 'u_res');
  const uColor  = gl.getUniformLocation(prog, 'u_color');
  const uAlpha  = gl.getUniformLocation(prog, 'u_alpha');

  const N = 1 << 20;
  const pos = new Float32Array(N * 2);
  for (let i = 0; i < pos.length; i++) pos[i] = Math.random() * 2 - 1;
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);

  function resize() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
    }
  }

  /* read particle color + bg from CSS vars */
  let particleColor = [0.15,0.13,0.12];  // light default
  let particleAlpha = 0.035;
  let bgColor       = [0.971,0.965,0.941];  // light default

  function readTheme() {
    const style = getComputedStyle(document.documentElement);
    const c = style.getPropertyValue('--canvas-particle').trim().split(',').map(Number);
    const a = parseFloat(style.getPropertyValue('--canvas-alpha').trim());
    const b = style.getPropertyValue('--canvas-bg').trim().split(',').map(Number);
    if (c.length === 3) particleColor = c;
    if (!isNaN(a)) particleAlpha = a;
    if (b.length === 3) bgColor = b;
  }
  readTheme();

  function tick(ms) {
    resize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(bgColor[0], bgColor[1], bgColor[2], 1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(prog);
    gl.uniform1f(uTime, ms);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform3f(uColor, particleColor[0], particleColor[1], particleColor[2]);
    gl.uniform1f(uAlpha, particleAlpha);

    gl.enableVertexAttribArray(aPos);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

    gl.drawArrays(gl.POINTS, 0, N);
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  /* watch theme toggle */
  new MutationObserver(() => { readTheme(); }).observe(
    document.documentElement, { attributes: true, attributeFilter: ['class'] }
  );
})();
</script>

<script>
/* ═══════════════════════════════════════════════
   theme toggle
   ═══════════════════════════════════════════════ */
(function(){
  const html = document.documentElement;
  const btn  = document.getElementById('themeToggle');

  /* prefer system dark → start dark; no preference → light */
  const saved  = localStorage.getItem('mathbarker-theme');
  const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches;

  if (saved === 'dark' || (!saved && prefer)) {
    html.classList.add('dark');
    document.querySelector('meta[name=theme-color]').content = '#0d0d0d';
  }

  btn.addEventListener('click', () => {
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    localStorage.setItem('mathbarker-theme', isDark ? 'dark' : 'light');
    document.querySelector('meta[name=theme-color]').content = isDark ? '#0d0d0d' : '#faf7f0';
  });
})();
