<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>mathbarker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #e8e8e8;
      --faint: #8a8a8a;
      --accent: #ffffff;
    }

    html, body { height: 100%; }

    body {
      background: #000;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #chaosCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      font-style: italic;
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--faint);
      letter-spacing: 0.08em;
      margin-bottom: 48px;
    }

    .card {
      background: rgba(20,20,20,0.80);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 40px 28px;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--faint);
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      padding: 12px 40px;
      background: rgba(255,255,255,0.12);
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.3);
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
<canvas id="chaosCanvas"></canvas>

<div class="wrap">
  <div class="logo">mathbarker</div>
  <div class="tagline">singularity & structure</div>

  <div class="card">
    <p>
      A math platform built on simplicity.<br>
      No choices. No tricks.<br>
      Just numbers and the truth.
    </p>
    <div class="btn">Enter</div>
  </div>

</div>

<script>
/* de Jong attractor — WebGL particle field
   Adapted from qc20/dejong-attractor (MIT-compatible) */
(function(){
  const canvas = document.getElementById('chaosCanvas');
  const gl = canvas.getContext('webgl', {alpha: false}) ||
             canvas.getContext('experimental-webgl', {alpha: false});
  if (!gl) return;

  /* ── shaders ── */
  const vertSrc = `
    attribute vec2 a_pos;
    uniform float u_time;
    uniform vec2 u_res;
    void main() {
      float a = -2.0 + sin(u_time / 8000.0);
      float b = -2.0 + cos(u_time / 12000.0) * 0.3;
      float c = -1.2 + sin(u_time / 10000.0) * 0.2;
      float d =  2.0 + cos(u_time / 9000.0)  * 0.3;

      vec2 p = a_pos;
      for (int i = 0; i < 100; i++) {
        float x = sin(a * p.y) - cos(b * p.x);
        float y = sin(c * p.x) - cos(d * p.y);
        p = vec2(x, y);
      }
      vec2 screen = (p * 0.52 + 0.5) * u_res;
      gl_Position = vec4((screen / u_res) * 2.0 - 1.0, 0.0, 1.0);
      gl_PointSize = 1.3;
    }`;

  const fragSrc = `
    precision mediump float;
    void main() {
      gl_FragColor = vec4(1.0, 1.0, 1.0, 0.045);
    }`;

  /* ── compile ── */
  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);

  const aPos = gl.getAttribLocation(prog, 'a_pos');
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes  = gl.getUniformLocation(prog, 'u_res');

  /* ── 1M particles ── */
  const N = 1 << 20;
  const pos = new Float32Array(N * 2);
  for (let i = 0; i < pos.length; i++) pos[i] = Math.random() * 2 - 1;
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);

  /* ── render loop ── */
  function resize() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
    }
  }

  function tick(ms) {
    resize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);

    gl.useProgram(prog);
    gl.uniform1f(uTime, ms);
    gl.uniform2f(uRes, canvas.width, canvas.height);

    gl.enableVertexAttribArray(aPos);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

    gl.drawArrays(gl.POINTS, 0, N);
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
