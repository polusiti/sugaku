<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>mathbarker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #0d0d0d;
      --ink: #d8d8d8;
      --faint: #5a5a5a;
      --line: rgba(255,255,255,0.025);
      --card-bg: #111111;
    }

    html, body { height: 100%; }

    body {
      background: var(--paper);
      font-family: 'Caveat', cursive;
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── noise texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
    }

    /* ── de Jong canvas ── */
    #chaosCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      opacity: 0.50;
      mix-blend-mode: screen;
    }

    /* ── notebook grid ── */
    .notebook-grid {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(transparent, transparent 31px, var(--line) 31px, var(--line) 32px);
      background-size: 100% 32px;
    }

    /* ── page ── */
    .wrap {
      position: relative; z-index: 3;
      width: 100%; max-width: 560px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ── header ── */
    .hd {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 0 4px 16px;
      border-bottom: 1.5px dashed rgba(255,255,255,0.15);
      margin-bottom: 40px;
    }
    .logo {
      font-size: 2rem; font-weight: 700;
      letter-spacing: 0.04em;
      transform: rotate(-0.6deg);
    }
    .logo-sub {
      font-size: 0.65rem; font-weight: 400;
      color: var(--faint); margin-left: 4px;
    }
    .hd-right {
      font-size: 0.85rem; color: var(--faint);
      transform: rotate(0.4deg);
    }

    /* ── memo card ── */
    .memo {
      position: relative;
      background: var(--card-bg);
      padding: 32px 28px 24px;
      cursor: pointer;
      font-family: 'Caveat', cursive;
      border: 1.5px solid rgba(255,255,255,0.06);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .memo:hover {
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 0 40px rgba(255,255,255,0.02);
    }

    .memo + .memo { margin-top: 24px; }

    /* subtle per-card rotation */
    .memo:nth-child(1) { transform: rotate(-0.4deg); }
    .memo:nth-child(2) { transform: rotate(0.3deg); }
    .memo:nth-child(3) { transform: rotate(0.5deg); }
    .memo:nth-child(4) { transform: rotate(-0.2deg); }
    .memo:nth-child(1):hover { transform: rotate(-0.4deg) translateY(-2px); }
    .memo:nth-child(2):hover { transform: rotate(0.3deg) translateY(-2px); }
    .memo:nth-child(3):hover { transform: rotate(0.5deg) translateY(-2px); }
    .memo:nth-child(4):hover { transform: rotate(-0.2deg) translateY(-2px); }

    /* ── hand-drawn corner marks ── */
    .memo::before {
      content: '';
      position: absolute; top: -1px; left: -1px;
      width: 24px; height: 24px;
      border-top: 1.5px solid rgba(255,255,255,0.12);
      border-left: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 0 0 4px 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .memo::after {
      content: '';
      position: absolute; bottom: -1px; right: -1px;
      width: 24px; height: 24px;
      border-bottom: 1.5px solid rgba(255,255,255,0.12);
      border-right: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 4px 0 0 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .memo:hover::before, .memo:hover::after { opacity: 1; }

    .memo-num {
      font-size: 0.7rem; font-weight: 600; color: var(--faint);
      letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .memo-cat {
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: 0.03em; margin-bottom: 4px;
    }
    .memo-desc {
      font-size: 0.85rem; color: var(--faint);
      line-height: 1.7;
    }
    .memo-symbol {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 0.75rem;
      color: var(--faint);
      margin-bottom: 8px;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    /* ── footer ── */
    .foot {
      text-align: center; margin-top: 48px;
      padding-top: 20px;
      border-top: 1px dashed rgba(255,255,255,0.06);
    }
    .foot-text {
      font-size: 0.7rem; color: #333;
      letter-spacing: 0.1em; transform: rotate(-0.3deg);
      display: inline-block;
    }

    /* ── paper clip / tape hint ── */
    .tape {
      position: absolute; top: -12px; left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 36px; height: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .memo:hover .tape { opacity: 1; }

  </style>
</head>
<body>
<canvas id="chaosCanvas"></canvas>
<div class="notebook-grid"></div>

<div class="wrap">
  <header class="hd">
    <span class="logo">mathbarker<span class="logo-sub">.top</span></span>
    <span class="hd-right">singularity &amp; structure</span>
  </header>

  <div class="memo" onclick="location.href='/theory'">
    <span class="tape"></span>
    <div class="memo-num">I</div>
    <div class="memo-symbol">f (x) &nbsp;=&nbsp; x</div>
    <div class="memo-cat">Theory</div>
    <div class="memo-desc">Algebra &middot; Calculus &middot; Geometry</div>
  </div>

  <div class="memo" onclick="location.href='/exam'">
    <span class="tape"></span>
    <div class="memo-num">II</div>
    <div class="memo-symbol">&Sigma; answer &nbsp;=&nbsp; sum</div>
    <div class="memo-cat">Exam</div>
    <div class="memo-desc">Center exams &amp; entrance problems</div>
  </div>

  <div class="memo" onclick="location.href='/review'">
    <span class="tape"></span>
    <div class="memo-num">III</div>
    <div class="memo-symbol">Review &amp; repeat</div>
    <div class="memo-cat">Notebook</div>
    <div class="memo-desc">Your mistakes, revisited</div>
  </div>

  <div class="memo">
    <span class="tape"></span>
    <div class="memo-num">IV</div>
    <div class="memo-symbol">No choices. No tricks.</div>
    <div class="memo-cat">The Method</div>
    <div class="memo-desc">Sum all the numbers. Just numbers and the truth.</div>
  </div>

  <div class="foot">
    <span class="foot-text">MATHBARKER</span>
  </div>
</div>

<script>
/* de Jong attractor — monochrome silver on dark */
(function(){
  const canvas = document.getElementById('chaosCanvas');
  const gl = canvas.getContext('webgl', {alpha: false}) ||
             canvas.getContext('experimental-webgl', {alpha: false});
  if (!gl) return;

  const vertSrc = `
    attribute vec2 a_pos;
    uniform float u_time;
    uniform vec2 u_res;
    void main() {
      float a = -2.0 + sin(u_time / 8000.0);
      float b = -2.0 + cos(u_time / 12000.0) * 0.3;
      float c = -1.2 + sin(u_time / 10000.0) * 0.2;
      float d =  2.0 + cos(u_time / 9000.0)  * 0.3;
      vec2 p = a_pos;
      for (int i = 0; i < 100; i++) {
        float x = sin(a * p.y) - cos(b * p.x);
        float y = sin(c * p.x) - cos(d * p.y);
        p = vec2(x, y);
      }
      vec2 screen = (p * 0.52 + 0.5) * u_res;
      gl_Position = vec4((screen / u_res) * 2.0 - 1.0, 0.0, 1.0);
      gl_PointSize = 1.3;
    }`;

  const fragSrc = `
    precision mediump float;
    void main() {
      gl_FragColor = vec4(0.75, 0.75, 0.78, 0.038);
    }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);

  const aPos = gl.getAttribLocation(prog, 'a_pos');
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes  = gl.getUniformLocation(prog, 'u_res');

  const N = 1 << 20;
  const pos = new Float32Array(N * 2);
  for (let i = 0; i < pos.length; i++) pos[i] = Math.random() * 2 - 1;
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);

  function resize() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
    }
  }

  function tick(ms) {
    resize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.05, 0.05, 0.05, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    gl.uniform1f(uTime, ms);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.enableVertexAttribArray(aPos);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.drawArrays(gl.POINTS, 0, N);
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
