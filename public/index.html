<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>mathbarker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f0;
      --ink: #2a2a2a;
      --faint: #999;
      --line: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.06);
      --dash: rgba(0,0,0,0.10);
      --row-hover: rgba(0,0,0,0.02);
      --noise-opacity: 0.04;
      --noise-invert: 0%;
      --canvas-bg: 0.97,0.96,0.94;
      --canvas-particle: 0.15,0.13,0.12;
      --canvas-alpha: 0.035;
      --canvas-opacity: 0.35;
      --canvas-mix: multiply;
      --grid-rgba: rgba(0,0,0,0.03);
    }

    :root.dark {
      --bg: #0d0d0d;
      --ink: #d8d8d8;
      --faint: #4a4a4a;
      --line: rgba(255,255,255,0.016);
      --border: rgba(255,255,255,0.05);
      --dash: rgba(255,255,255,0.08);
      --row-hover: rgba(255,255,255,0.015);
      --noise-opacity: 0.05;
      --noise-invert: 100%;
      --canvas-bg: 0.05,0.05,0.05;
      --canvas-particle: 0.72,0.72,0.75;
      --canvas-alpha: 0.038;
      --canvas-opacity: 0.50;
      --canvas-mix: screen;
      --grid-rgba: rgba(255,255,255,0.018);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'Caveat', cursive;
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── noise ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      opacity: var(--noise-opacity);
      filter: invert(var(--noise-invert));
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      transition: opacity 0.4s ease, filter 0.4s ease;
    }

    /* ── ghost marks (light only) ── */
    .ghost-marks {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: 0;
      transition: opacity 0.5s ease;
    }
    :root:not(.dark) .ghost-marks { opacity: 0.55; }
    .ghost-marks svg {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    .ghost-marks line, .ghost-marks path, .ghost-marks polyline,
    .ghost-marks circle, .ghost-marks ellipse {
      fill: none; stroke: #bab5a8;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .ghost-marks text { font-family: 'Georgia', serif; }

    /* ── de Jong ── */
    #chaosCanvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      opacity: var(--canvas-opacity);
      mix-blend-mode: var(--canvas-mix);
      transition: opacity 0.4s ease;
    }

    /* ── notebook grid ── */
    .notebook-grid {
      position: fixed; inset: 0; z-index: 2;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(transparent, transparent 31px, var(--grid-rgba) 31px, var(--grid-rgba) 32px);
      background-size: 100% 32px;
    }

    /* ── page ── */
    .wrap {
      position: relative; z-index: 3;
      width: 100%; max-width: 500px;
      margin: 0 auto;
      padding: 48px 28px 60px;
    }

    /* ── header ── */
    .hd {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 44px;
    }
    .logo {
      font-size: 1.8rem; font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--ink);
      transition: color 0.4s ease;
    }
    .hd-right {
      display: flex; align-items: center; gap: 12px;
      font-size: 0.75rem; color: var(--faint);
      letter-spacing: 0.06em;
      transition: color 0.4s ease;
    }

    /* theme toggle */
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 20px;
      width: 34px; height: 20px;
      cursor: pointer;
      position: relative;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--dash); }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--ink);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.4s ease;
    }
    :root.dark .theme-toggle::after { transform: translateX(14px); }

    /* ── contents ── */
    .toc { list-style: none; }

    .toc-section { margin-bottom: 28px; }

    .toc-head {
      font-size: 0.72rem; font-weight: 600;
      color: var(--faint); letter-spacing: 0.12em;
      padding: 0 4px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      transition: color 0.4s ease;
    }

    .toc-row {
      display: flex; align-items: baseline;
      padding: 13px 4px;
      cursor: pointer;
      font-family: 'Caveat', cursive;
      color: var(--ink);
      text-decoration: none;
      transition: background 0.15s ease, padding-left 0.2s ease;
      border-bottom: 1px solid var(--line);
    }
    .toc-row:hover {
      background: var(--row-hover);
      padding-left: 10px;
    }

    .toc-label {
      flex: 1; min-width: 0;
      font-size: 1.15rem; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .toc-meta {
      flex-shrink: 0; text-align: right;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.04em; margin-left: 12px;
      color: var(--faint);
      transition: color 0.4s ease;
    }

    /* ── rule note ── */
    .rule-note {
      margin-top: 36px;
      padding: 0 0 0 14px;
      border-left: 1.5px solid var(--border);
      transition: border-color 0.4s ease;
    }
    .rule-note-title {
      font-size: 0.65rem; font-weight: 600;
      color: var(--faint); letter-spacing: 0.12em;
      margin-bottom: 6px;
      transition: color 0.4s ease;
    }
    .rule-note p {
      font-size: 0.82rem; line-height: 1.7;
      color: var(--faint);
      transition: color 0.4s ease;
    }
    .rule-ex {
      margin-top: 4px;
      font-size: 0.75rem !important;
      opacity: 0.7;
    }

  </style>
</head>
<body>
<canvas id="chaosCanvas"></canvas>

<script>
/* ── identity (silent) ── */
(function(){
  const KEY = 'mathbarker_id';
  if (!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY, JSON.stringify({ uuid: crypto.randomUUID(), handle: '' }));
  }
})();

/* ── accuracy ── */
(async function(){
  try {
    const id = JSON.parse(localStorage.getItem('mathbarker_id') || '{}');
    const r = await fetch('/api/accuracy?uuid=' + (id.uuid || ''));
    if (!r.ok) return;
    const data = await r.json();

    // per-group rates
    for (const g of (data.groups || [])) {
      const key = g.level + '-' + g.subject_group;
      const el = document.querySelector(`[data-key="${key}"]`);
      if (el && g.total > 0) {
        const pct = Math.round(g.correct / g.total * 100);
        el.textContent = pct + '%';
      }
    }
    // review count
    if (data.reviewCount > 0) {
      const rb = document.getElementById('reviewBadge');
      if (rb) rb.textContent = data.reviewCount;
    }
  } catch(_) {}
})();
</script>

<script>
/* de Jong */
(function(){
  const canvas = document.getElementById('chaosCanvas');
  const gl = canvas.getContext('webgl', {alpha: false}) ||
             canvas.getContext('experimental-webgl', {alpha: false});
  if (!gl) return;

  const vertSrc = `
    attribute vec2 a_pos;
    uniform float u_time;
    uniform vec2 u_res;
    void main() {
      float a = -2.0 + sin(u_time / 8000.0);
      float b = -2.0 + cos(u_time / 12000.0) * 0.3;
      float c = -1.2 + sin(u_time / 10000.0) * 0.2;
      float d =  2.0 + cos(u_time / 9000.0)  * 0.3;
      vec2 p = a_pos;
      for (int i = 0; i < 100; i++) {
        float x = sin(a * p.y) - cos(b * p.x);
        float y = sin(c * p.x) - cos(d * p.y);
        p = vec2(x, y);
      }
      vec2 screen = (p * 0.52 + 0.5) * u_res;
      gl_Position = vec4((screen / u_res) * 2.0 - 1.0, 0.0, 1.0);
      gl_PointSize = 1.3;
    }`;

  const fragSrc = `
    precision mediump float;
    uniform vec3 u_color;
    uniform float u_alpha;
    void main() { gl_FragColor = vec4(u_color, u_alpha); }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);

  const aPos   = gl.getAttribLocation(prog, 'a_pos');
  const uTime  = gl.getUniformLocation(prog, 'u_time');
  const uRes   = gl.getUniformLocation(prog, 'u_res');
  const uColor = gl.getUniformLocation(prog, 'u_color');
  const uAlpha = gl.getUniformLocation(prog, 'u_alpha');

  const N = 1 << 20;
  const pos = new Float32Array(N * 2);
  for (let i = 0; i < pos.length; i++) pos[i] = Math.random() * 2 - 1;
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);

  function resize() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
    }
  }

  let pColor = [0.15,0.13,0.12], pAlpha = 0.035, bg = [0.971,0.965,0.941];
  function readTheme() {
    const s = getComputedStyle(document.documentElement);
    const c = s.getPropertyValue('--canvas-particle').trim().split(',').map(Number);
    const a = parseFloat(s.getPropertyValue('--canvas-alpha'));
    const b = s.getPropertyValue('--canvas-bg').trim().split(',').map(Number);
    if (c.length===3) pColor = c;
    if (!isNaN(a)) pAlpha = a;
    if (b.length===3) bg = b;
  }
  readTheme();

  function tick(ms) {
    resize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(bg[0], bg[1], bg[2], 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    gl.uniform1f(uTime, ms);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform3f(uColor, pColor[0], pColor[1], pColor[2]);
    gl.uniform1f(uAlpha, pAlpha);
    gl.enableVertexAttribArray(aPos);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.drawArrays(gl.POINTS, 0, N);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  new MutationObserver(readTheme).observe(document.documentElement, {attributes:true,attributeFilter:['class']});
})();
</script>

<script>
(function(){
  const html = document.documentElement;
  const btn  = document.getElementById('themeToggle');
  const saved = localStorage.getItem('mathbarker-theme');
  const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'dark' || (!saved && prefer)) {
    html.classList.add('dark');
    document.querySelector('meta[name=theme-color]').content = '#0d0d0d';
  }
  btn.addEventListener('click', () => {
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    localStorage.setItem('mathbarker-theme', isDark ? 'dark' : 'light');
    document.querySelector('meta[name=theme-color]').content = isDark ? '#0d0d0d' : '#faf7f0';
  });
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');

</script>
