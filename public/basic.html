<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mathbarker — Basic</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f0; --ink: #2a2a2a; --faint: #999;
      --line: rgba(0,0,0,0.04); --border: rgba(0,0,0,0.06);
      --dash: rgba(0,0,0,0.10); --correct: #2a6e2a; --wrong: #8a2a2a;
    }
    :root.dark {
      --bg: #0d0d0d; --ink: #d8d8d8; --faint: #4a4a4a;
      --line: rgba(255,255,255,0.016); --border: rgba(255,255,255,0.05);
      --dash: rgba(255,255,255,0.08); --correct: #5cba5c; --wrong: #c85a5a;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: 'Caveat', cursive;
      color: var(--ink);
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
      display: flex; flex-direction: column; align-items: center;
    }

    .wrap {
      width: 100%; max-width: 520px;
      padding: 32px 24px 48px;
    }

    .hd {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    .back {
      color: var(--faint); text-decoration: none;
      font-size: 0.85rem; letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .back:hover { color: var(--ink); }
    .level-badge {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.1em; color: var(--faint);
    }
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 20px; width: 34px; height: 20px;
      cursor: pointer; position: relative;
      background: var(--bg); transition: border-color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--dash); }
    .theme-toggle::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ink);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    :root.dark .theme-toggle::after { transform: translateX(14px); }

    .counter {
      text-align: center; font-size: 0.7rem; color: var(--faint);
      letter-spacing: 0.08em; margin-bottom: 24px;
    }

    .q-card {
      border: 1px solid var(--border);
      padding: 36px 28px 28px;
      border-radius: 2px;
      transition: border-color 0.2s;
    }
    .q-card.done { border-color: var(--dash); }

    .q-text {
      font-size: 1.2rem; line-height: 1.8;
      margin-bottom: 28px;
    }

    .answer-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px;
    }
    .answer-input {
      width: 100px;
      background: none;
      border: none;
      border-bottom: 1.5px dashed var(--dash);
      padding: 8px 4px;
      font-family: 'Caveat', cursive;
      font-size: 1.3rem; font-weight: 600;
      color: var(--ink);
      caret-color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .answer-input:focus { border-bottom-color: var(--faint); }
    .answer-input.correct { border-bottom-color: var(--correct); color: var(--correct); }
    .answer-input.wrong { border-bottom-color: var(--wrong); color: var(--wrong); }

    .submit-btn {
      padding: 8px 24px;
      background: none;
      border: 1px solid var(--border);
      font-family: 'Caveat', cursive;
      font-size: 0.95rem;
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .submit-btn:hover { border-color: var(--dash); background: var(--line); }

    .feedback {
      font-size: 0.85rem; margin-bottom: 12px;
      min-height: 1.2em;
    }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong { color: var(--wrong); }

    .exp {
      margin-top: 18px;
      padding: 14px 16px;
      border-left: 2px solid var(--dash);
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--faint);
      display: none;
    }
    .exp.show { display: block; }

    .nav-row {
      display: flex; justify-content: space-between;
      margin-top: 24px;
    }
    .nav-btn {
      padding: 8px 20px;
      background: none;
      border: 1px solid var(--border);
      font-family: 'Caveat', cursive;
      font-size: 0.9rem;
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .nav-btn:hover { border-color: var(--dash); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .result {
      text-align: center; padding: 48px 24px;
    }
    .result-num {
      font-size: 3rem; font-weight: 700;
      margin-bottom: 8px;
    }
    .result-label {
      font-size: 0.8rem; color: var(--faint);
      letter-spacing: 0.06em;
      margin-bottom: 28px;
    }
    .stats {
      font-size: 0.78rem; color: var(--faint);
      line-height: 1.8;
    }

    .loading { text-align: center; padding: 48px 0; color: var(--faint); }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
<div class="wrap">
  <header class="hd">
    <a class="back" href="/">← mathbarker</a>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="level-badge">BASIC</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div class="counter" id="counter"></div>
  <div class="loading" id="loading">Loading...</div>

  <div id="quizArea" hidden>
    <div class="q-card" id="qCard">
      <div class="q-text" id="qText"></div>
      <div class="answer-row">
        <input class="answer-input" id="answerInput" type="text" inputmode="numeric" autocomplete="off" placeholder="?">
        <button class="submit-btn" id="submitBtn">submit</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="exp" id="exp"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" disabled>Previous</button>
      <button class="nav-btn" id="nextBtn">Next</button>
    </div>
  </div>

  <div id="resultArea" hidden>
    <div class="result">
      <div class="result-num" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <div class="stats" id="statsArea"></div>
      <button class="submit-btn" onclick="location.reload()" style="margin-top:24px">Retry</button>
      <a class="back" href="/" style="display:block;margin-top:16px">← home</a>
    </div>
  </div>
</div>

<script src="/basic.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
(async function(){
  /* theme */
  const html = document.documentElement;
  const saved = localStorage.getItem('mathbarker-theme');
  if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.classList.add('dark');
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    html.classList.toggle('dark');
    localStorage.setItem('mathbarker-theme', html.classList.contains('dark') ? 'dark' : 'light');
  });

  /* questions */
  const questions = await loadQuestions('basic');
  if (!questions.length) {
    document.getElementById('loading').textContent = 'No questions yet.';
    return;
  }

  let idx = 0, answers = [], startTime;

  const qCard = document.getElementById('qCard');
  const qText = document.getElementById('qText');
  const answerInput = document.getElementById('answerInput');
  const submitBtn = document.getElementById('submitBtn');
  const feedback = document.getElementById('feedback');
  const exp = document.getElementById('exp');
  const counter = document.getElementById('counter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const quizArea = document.getElementById('quizArea');
  const resultArea = document.getElementById('resultArea');

  document.getElementById('loading').hidden = true;
  quizArea.hidden = false;

  function showQuestion() {
    const q = questions[idx];
    const prev = answers[idx];
    qText.textContent = q.q;
    counter.textContent = (idx + 1) + ' / ' + questions.length;
    exp.innerHTML = '';
    exp.classList.remove('show');
    feedback.textContent = '';
    feedback.className = 'feedback';
    answerInput.className = 'answer-input';
    answerInput.disabled = false;
    submitBtn.disabled = false;
    answerInput.value = prev ? prev.userAnswer : '';
    answerInput.focus();
    prevBtn.disabled = idx === 0;
    nextBtn.textContent = idx + 1 < questions.length ? 'Next' : 'Finish';
    startTime = Date.now();
    renderMathInElement(qText, { delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$', right: '$', display: false },
      { left: '\\(', right: '\\)', display: false },
    ], throwOnError: false });
  }

  function submit() {
    const q = questions[idx];
    if (answers[idx]) return; // already answered

    const raw = answerInput.value.trim();
    const num = parseInt(raw, 10);
    if (isNaN(num)) { feedback.textContent = 'number please'; feedback.className = 'feedback wrong'; return; }

    const isCorrect = num === q.answer;
    answers[idx] = { userAnswer: raw, isCorrect, timeMs: Date.now() - startTime };

    feedback.textContent = isCorrect ? 'correct' : ('expected ' + q.answer);
    feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
    answerInput.className = 'answer-input ' + (isCorrect ? 'correct' : 'wrong');
    answerInput.disabled = true;
    submitBtn.disabled = true;

    if (q.explanation) {
      exp.innerHTML = q.explanation;
      exp.classList.add('show');
      renderMathInElement(exp, { delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
      ], throwOnError: false });
    }

    recordAnswer(q, num, isCorrect, answers[idx].timeMs);
  }

  function next() {
    if (!answers[idx]) return; // must answer first
    if (idx + 1 >= questions.length) {
      showResult();
      return;
    }
    idx++;
    showQuestion();
  }

  function prev() {
    if (idx > 0) { idx--; showQuestion(); }
  }

  async function showResult() {
    quizArea.hidden = true;
    resultArea.hidden = false;
    const correct = answers.filter(a => a && a.isCorrect).length;
    document.getElementById('resultScore').textContent = correct + '/' + questions.length;
    document.getElementById('resultLabel').textContent =
      correct === questions.length ? 'perfect' : correct > 0 ? 'good' : 'try again';

    const stats = await fetchStats();
    if (stats && stats.total > 0) {
      const rate = Math.round(stats.correct / stats.total * 100);
      document.getElementById('statsArea').innerHTML =
        'all time: ' + stats.total + ' solved, ' + rate + '% correct, ' +
        'avg ' + (stats.avg_time_ms / 1000).toFixed(1) + 's';
    }
  }

  submitBtn.addEventListener('click', submit);
  nextBtn.addEventListener('click', next);
  prevBtn.addEventListener('click', prev);
  answerInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
    if (e.key === 'ArrowRight' && answers[idx]) { next(); }
    if (e.key === 'ArrowLeft') { prev(); }
  });

  showQuestion();
})();
</script>
</body>
</html>
