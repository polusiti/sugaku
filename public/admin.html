<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mathbarker — Admin</title>
  <link rel="icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf7f0; --ink: #2a2a2a; --faint: #999;
      --border: rgba(0,0,0,0.08); --row-hover: rgba(0,0,0,0.02);
    }
    :root.dark {
      --bg: #0d0d0d; --ink: #d8d8d8; --faint: #4a4a4a;
      --border: rgba(255,255,255,0.06); --row-hover: rgba(255,255,255,0.015);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: 'Caveat', cursive;
      color: var(--ink);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }
    .wrap { width: 100%; max-width: 860px; margin: 0 auto; padding: 32px 24px; }

    .hd {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
    }
    .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.03em; }
    .hd a { color: var(--faint); text-decoration: none; font-size: 0.8rem; }

    /* login */
    .login-card {
      border: 1px solid var(--border); padding: 36px 28px;
      max-width: 340px; margin: 40px auto; text-align: center;
    }
    .login-card input {
      width: 100%; padding: 8px 4px;
      background: none; border: none;
      border-bottom: 1.5px dashed var(--border);
      font-family: 'Caveat', cursive; font-size: 1rem;
      color: var(--ink); outline: none; margin-bottom: 16px;
    }
    .btn {
      padding: 8px 28px; background: none;
      border: 1px solid var(--border);
      font-family: 'Caveat', cursive; font-size: 0.95rem;
      color: var(--ink); cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn:hover { border-color: var(--faint); }

    /* table */
    .toolbar { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .q-table { width: 100%; border-collapse: collapse; }
    .q-table th, .q-table td {
      padding: 10px 8px; text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .q-table th { font-size: 0.7rem; letter-spacing: 0.06em; color: var(--faint); font-weight: 600; }
    .q-row:hover { background: var(--row-hover); }
    .q-td-id { max-width: 140px; word-break: break-all; font-size: 0.78rem; }
    .q-td-lv { width: 70px; }
    .q-td-cat { width: 90px; font-size: 0.78rem; }
    .q-td-q { min-width: 200px; }
    .q-td-ans { width: 50px; text-align: center; }
    .q-td-act { width: 80px; }
    .act-btn {
      background: none; border: none;
      font-family: 'Caveat', cursive; font-size: 0.78rem;
      cursor: pointer; color: var(--faint);
      padding: 2px 6px;
    }
    .act-btn:hover { color: var(--ink); }
    .act-btn.del:hover { color: #c44; }

    /* editor */
    .editor {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .editor-card {
      background: var(--bg); border: 1px solid var(--border);
      padding: 32px 28px; width: 100%; max-width: 600px;
      max-height: 90vh; overflow-y: auto;
    }
    .editor-card h3 { margin-bottom: 20px; font-size: 1.1rem; }
    .editor-card label {
      display: block; font-size: 0.72rem; color: var(--faint);
      letter-spacing: 0.04em; margin-bottom: 4px; margin-top: 14px;
    }
    .editor-card input, .editor-card textarea, .editor-card select {
      width: 100%; padding: 8px 4px;
      background: none; border: none;
      border-bottom: 1px solid var(--border);
      font-family: 'Caveat', cursive; font-size: 0.95rem;
      color: var(--ink); outline: none;
    }
    .editor-card textarea { min-height: 80px; resize: vertical; }
    .editor-card input:focus, .editor-card textarea:focus { border-bottom-color: var(--faint); }
    .editor-btns { display: flex; gap: 10px; margin-top: 24px; }

    .ht { display: flex; align-items: center; gap: 12px; }
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: 20px; width: 34px; height: 20px;
      cursor: pointer; position: relative;
      background: var(--bg); transition: border-color 0.2s;
    }
    .theme-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ink);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    :root.dark .theme-toggle::after { transform: translateX(14px); }
  </style>
</head>
<body>
<div class="wrap">
  <header class="hd">
    <span class="logo">mathbarker · admin</span>
    <div class="ht">
      <a href="/">← home</a>
      <button class="theme-toggle" id="themeToggle"></button>
    </div>
  </header>

  <!-- login -->
  <div class="login-card" id="loginCard">
    <input type="password" id="adminPw" placeholder="password" autocomplete="off">
    <button class="btn" onclick="login()">Login</button>
  </div>

  <!-- admin -->
  <div id="adminCard">
    <div class="toolbar">
      <span style="font-size:0.75rem;color:var(--faint)">questions</span>
      <button class="btn" onclick="newQ()">+ New</button>
    </div>

    <table class="q-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Level</th>
          <th>Category</th>
          <th>Question</th>
          <th>Ans</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="qTable"></tbody>
    </table>
  </div>
</div>

<!-- editor modal -->
<div class="editor" id="editor" style="display:none">
  <div class="editor-card">
    <h3 id="editorTitle">New Question</h3>
    <label>ID</label>
    <input id="qId" placeholder="basic-algebra-002">
    <label>Level</label>
    <select id="qLevel">
      <option value="basic">basic</option>
      <option value="standard">standard</option>
      <option value="random">random</option>
      <option value="review">review</option>
    </select>
    <label>Category</label>
    <input id="qCat" placeholder="algebra">
    <label>Question (LaTeX $...$)</label>
    <textarea id="qText"></textarea>
    <label>Explanation (LaTeX $...$)</label>
    <textarea id="qExp"></textarea>
    <label>Answer (number)</label>
    <input id="qAns" type="number" inputmode="numeric">
    <div class="editor-btns">
      <button class="btn" onclick="saveQ()">Save</button>
      <button class="btn" onclick="closeEditor()" style="color:var(--faint)">Cancel</button>
    </div>
  </div>
</div>

<script src="/admin.js"></script>
<script>
  const html = document.documentElement;
  const saved = localStorage.getItem('mathbarker-theme');
  if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.classList.add('dark');
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    html.classList.toggle('dark');
    localStorage.setItem('mathbarker-theme', html.classList.contains('dark') ? 'dark' : 'light');
  });
</script>
</body>
</html>
